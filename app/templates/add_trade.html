{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>Add Trade</h1>
    <p>Record your trading journal entry.</p>
</div>

{% if error %}
    <div class="alert alert-error">{{ error }}</div>
{% endif %}

<form class="trade-form" action="/trades/add" method="post" enctype="multipart/form-data">

    <div class="floating-group">
        <input type="date" name="trade_date" placeholder=" " required>
        <label>Date</label>
    </div>

    <div class="floating-group">
        <input type="text" name="symbol" placeholder=" " required>
        <label>Symbol (e.g. XAUUSD)</label>
    </div>

    <div class="floating-group">
        <select name="direction" required>
            <option value="" selected disabled hidden></option>
            <option value="Buy">Buy</option>
            <option value="Sell">Sell</option>
        </select>
        <label>Direction</label>
    </div>

    <div class="floating-group">
        <input type="number" step="any" name="entry_price" placeholder=" " required>
        <label>Entry Price</label>
    </div>

    <div class="floating-group">
        <input type="number" step="any" name="stop_loss" placeholder=" " required>
        <label>Stop Loss</label>
    </div>

    <div class="floating-group">
        <input type="number" step="any" name="take_profit" placeholder=" " required>
        <label>Take Profit</label>
    </div>

    <div class="floating-group">
        <input type="number" step="any" name="lot_size" placeholder=" " required>
        <label>Lot Size</label>
    </div>

    <div class="floating-group">
        <input type="number" step="any" name="risk_amount" placeholder=" " required>
        <label>Risk Amount ($)</label>
    </div>

    <div class="floating-group">
        <select name="result" required>
            <option value="" selected disabled hidden></option>
            <option value="TP">Take Profit</option>
            <option value="SL">Stop Loss</option>
            <option value="BE">Break Even</option>
            <option value="Manual Close">Manual Close</option>
        </select>
        <label>Result</label>
    </div>

    <div class="floating-group">
        <input type="number" step="any" name="profit_loss" placeholder=" " required>
        <label>Profit / Loss ($)</label>
    </div>

    <div class="floating-group">
        <input type="text" name="strategy" placeholder=" ">
        <label>Strategy</label>
    </div>

    <div class="floating-group">
        <input type="text" name="mistake" list="mistake-list" placeholder=" ">
        <label>Mistake</label>
    </div>

    <datalist id="mistake-list">
        <option value="No Mistake">
        <option value="Entered Too Early">
        <option value="Entered Too Late">
        <option value="Moved Stop Loss">
        <option value="Overtrading">
        <option value="Revenge Trade">
        <option value="No Confirmation">
        <option value="Bad Risk Management">
        <option value="Ignored News">
    </datalist>

    <div class="floating-group">
        <input type="text" name="emotion" placeholder=" ">
        <label>Emotion</label>
    </div>

    <div class="notes-group">
    <label>Trade Notes</label>
    <textarea name="notes" placeholder="Write your trade notes..."></textarea>
    </div>

    <div class="file-upload-modern full-width">
        <label>Chart Screenshots</label>
        <p>Upload JPG, PNG, WEBP images. Max 5MB each.</p>
        <input type="file" name="screenshots" multiple accept=".jpg,.jpeg,.png,.webp">
    </div>

    <button type="submit">Save Trade</button>
</form>
{% endblock %}
